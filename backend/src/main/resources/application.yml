server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:isma_archivo}?createDatabaseIfNotExist=true&serverTimezone=America/Argentina/Buenos_Aires
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - profile
              - email

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  frontend-urls: ${FRONTEND_URLS:${FRONTEND_URL:http://localhost:5173}}
  admin:
    email: ${ADMIN_EMAIL:admin@isma.local}
    password: ${ADMIN_PASSWORD:admin123}
  upload:
    max-bytes: ${UPLOAD_MAX_BYTES:10485760}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:isma-archivo}
